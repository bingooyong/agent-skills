# OpenAI/ChatGPT 技能元数据（项目文档治理）
# 用于技能列表与触发描述

display_name: 项目文档治理
short_description: 规划、生成、补全与维护企业级项目文档体系，优先以 Memory ROOT 为基线，支持缺口分析、增量更新与质量校验。
default_prompt: |
  请基于本项目的 Memory ROOT 与现有文档，执行项目文档治理：
  1. 先读取 Memory ROOT（.apm/Memory/Memory_Root.md 或我指定的路径）。
  2. 盘点现有文档并对照文档体系清单，给出缺口分析。
  3. 按我指定的范围（或缺口优先级）生成/补全/同步文档，保持术语与交叉引用一致。
  4. 增量更新优先，不确定处标记「待补充」，对外/对内文档区分。
  若我未指定具体动作，请先输出缺口分析报告与建议的文档生成顺序。
